name: CI/CD Inventory System Pipeline - TP5

# 1. TRIGGERS (Req. 2)
on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ==========================================
  # JOB 1: BUILD, TESTS & SAST (Req. 2)
  # ==========================================
  build-and-sast:
    name: Build, Unit Tests & SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Execute Build, Tests, JaCoCo, and PMD
        run: ./mvnw clean verify

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Generate Build Summary
        if: always()
        run: |
          echo "### 📊 Build and Test Summary (Maven)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **SAST Analysis:** Executed via CodeQL" >> $GITHUB_STEP_SUMMARY

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-system-app
          path: target/*.jar
          retention-days: 7

  # ==========================================
  # JOB 2: VALIDATE DEV (Main Branch)
  # ==========================================
  validate-dev:
    name: Validate Dev Environment
    needs: build-and-sast
    runs-on: ubuntu-latest
    environment: pb-tp5 / main
    steps:
      - name: Health Check Dev
        run: |
          echo "Checking Dev URL: ${{ vars.DEV_URL }}"
          sleep 30
          curl -s --head --fail ${{ vars.DEV_URL }} || exit 1

  # ==========================================
  # JOB 3: VALIDATE STAGING (Staging Branch)
  # ==========================================
  validate-staging:
    name: Validate Staging Environment
    needs: build-and-sast
    runs-on: ubuntu-latest
    environment: pb-tp5 / staging
    steps:
      - name: Health Check Staging
        run: |
          echo "Checking Staging URL: ${{ vars.STAGING_URL }}"
          sleep 30
          curl -s --head --fail ${{ vars.STAGING_URL }} || exit 1

  # ==========================================
  # JOB 4: FINAL QUALITY GATE (Manual)
  # ==========================================
  quality-gate:
    name: Final Manual Approval
    needs: [validate-dev, validate-staging]
    runs-on: ubuntu-latest
    environment: pb-tp5 / staging
    steps:
      - name: Success Signal
        run: echo "::notice title=Quality Gate::All environments validated and approved manually."