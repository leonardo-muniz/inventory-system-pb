<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory | Manage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .main-card {
            background-color: #ffffff;
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08) !important;
        }
        .form-control, .form-select {
            border: 1px solid #e0e4e9;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
        .input-group-text {
            border-radius: 0.75rem 0 0 0.75rem;
            background-color: #f8f9fa;
            border: 1px solid #e0e4e9;
            color: #6c757d;
        }
        .btn-save {
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }
        .field-disabled {
            background-color: #f8f9fa !important;
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark mb-1">
                    <span th:text="${productId == 0 ? 'Create New Product' : 'Edit Existing Product'}"></span>
                </h2>
                <p class="text-muted">Fill in the details below to update your inventory</p>
            </div>

            <div class="card main-card p-4 p-lg-5">
                <form th:action="${productId == 0} ? @{/products} : @{/products/{id}(id=${productId})}"
                      th:object="${productDTO}" method="post" id="productForm">

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-secondary">PRODUCT NAME</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               placeholder="e.g. Gaming Mouse"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label fw-semibold small text-secondary mb-0">DESCRIPTION</label>
                            <small class="text-muted" id="charCount">0/255</small>
                        </div>
                        <textarea th:field="*{description}" class="form-control" rows="3"
                                  id="descInput" maxlength="255"
                                  placeholder="Briefly describe the product..."
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small text-secondary">PRICE</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="col-md-6" id="stockContainer">
                            <label class="form-label fw-semibold small text-secondary">STOCK QUANTITY</label>
                            <input type="number" th:field="*{quantity}" class="form-control" id="quantityField"
                                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{quantity}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold small text-secondary">CATEGORY TYPE</label>
                        <select th:field="*{category}" class="form-select" id="categorySelect"
                                th:disabled="${productId != 0}"
                                th:classappend="${#fields.hasErrors('category')} ? 'is-invalid' : ''">
                            <option value="" selected disabled>Select a type...</option>
                            <option value="PHYSICAL">Physical Product</option>
                            <option value="DIGITAL">Digital Product</option>
                        </select>

                        <input type="hidden" th:if="${productId != 0}" th:field="*{category}" />

                        <div class="invalid-feedback" th:errors="*{category}"></div>
                        <small th:if="${productId != 0}" class="text-muted mt-1 d-block">
                            <i class="bi bi-info-circle me-1"></i> Category cannot be changed after creation.
                        </small>
                    </div>

                    <hr class="my-4 text-secondary opacity-25">

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-save">
                            <i class="bi bi-check2-circle me-1"></i> Save Product Details
                        </button>
                        <a th:href="@{/products}" class="btn btn-link text-secondary text-decoration-none small text-center">
                            Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const categorySelect = document.getElementById('categorySelect');
        const quantityField = document.getElementById('quantityField');
        const stockContainer = document.getElementById('stockContainer');
        const descInput = document.getElementById('descInput');
        const charCount = document.getElementById('charCount');

        function handleCategoryChange() {
            if (categorySelect.value === 'DIGITAL') {
                quantityField.value = 0;
                quantityField.readOnly = true;
                quantityField.classList.add('field-disabled');
                stockContainer.style.opacity = '0.6';
            } else {
                quantityField.readOnly = false;
                quantityField.classList.remove('field-disabled');
                stockContainer.style.opacity = '1';
            }
        }

        function updateCharCount() {
            charCount.textContent = `${descInput.value.length}/255`;
        }

        categorySelect.addEventListener('change', handleCategoryChange);
        descInput.addEventListener('input', updateCharCount);

        // Inicialização
        handleCategoryChange();
        updateCharCount();
    });
</script>

</body>
</html>
