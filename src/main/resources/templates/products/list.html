<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory | Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .main-card {
            background-color: #ffffff;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05) !important;
        }
        .table thead th {
            background-color: #f8f9fa;
            color: #6c757d;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #edf2f7;
        }
        /* Estilo para descrições longas */
        .description-text {
            display: block;
            color: #6c757d;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-top: 2px;
            word-wrap: break-word;
            white-space: normal;
        }
        /* Ajuste para o ícone de estado vazio */
        .empty-icon {
            color: #dee2e6; /* Cinza médio suave */
            font-size: 5rem;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-0">Inventory Dashboard</h2>
            <p class="text-muted small">Manage your physical and digital assets</p>
        </div>
        <a th:href="@{/products/new}" class="btn btn-primary shadow-sm rounded-pill px-4 py-2 fw-bold">
            <i class="bi bi-plus-lg me-1"></i> Add Product
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm mb-4" th:text="${successMessage}"></div>

    <div class="card main-card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4 py-3" style="width: 40%;">Product Name</th>
                    <th class="py-3">Price</th>
                    <th class="py-3">Stock Status</th>
                    <th class="py-3">Category</th>
                    <th class="py-3">Last Update</th>
                    <th class="py-3 text-center pe-4">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td class="ps-4">
                        <div class="fw-bold text-dark" th:text="${p.name}">Product Name</div>
                        <span class="description-text"
                              th:text="${#strings.length(p.description) > 75 ? #strings.substring(p.description, 0, 72) + '...' : p.description}"
                              th:title="${p.description}">
                        </span>
                    </td>
                    <td>
                        <span class="text-dark fw-medium" th:text="${'$' + p.price}"></span>
                    </td>
                    <td>
                        <span th:if="${p.categoryType == 'PHYSICAL'}"
                              th:text="${p.quantity}"
                              class="badge px-3 py-2"
                              th:classappend="${p.quantity < 5} ? 'bg-danger text-white' :
                                             (${p.quantity <= 10} ? 'bg-warning text-dark' : 'bg-success-subtle text-success')">
                        </span>

                        <span th:if="${p.categoryType == 'DIGITAL'}"
                              class="badge bg-info-subtle text-info px-3 py-2">
                            <i class="bi bi-infinity me-1"></i> UNLIMITED
                        </span>
                    </td>
                    <td>
                        <span th:if="${p.categoryType == 'PHYSICAL'}" class="text-secondary small text-uppercase fw-semibold">
                            <i class="bi bi-box-seam me-1"></i> Physical
                        </span>
                        <span th:if="${p.categoryType == 'DIGITAL'}" class="text-secondary small text-uppercase fw-semibold">
                            <i class="bi bi-cloud-download me-1"></i> Digital
                        </span>
                    </td>
                    <td>
                        <span class="text-muted small">
                            <i class="bi bi-clock-history me-1"></i>
                            <span th:text="${p.updatedAt != null ? #temporals.format(p.updatedAt, 'dd/MM/yyyy HH:mm') :
                                            (p.createdAt != null ? #temporals.format(p.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A')}">
                            </span>
                        </span>
                    </td>
                    <td class="text-center pe-4">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-outline-warning btn-sm border-0">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-danger btn-sm border-0"
                                        onclick="return confirm('Are you sure?')">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="5" class="text-center py-5">
                        <i class="bi bi-inbox empty-icon d-block mb-3"></i>
                        <p class="text-muted fw-medium mb-0">No products found in the inventory.</p>
                        <small class="text-secondary">Your stock is currently empty.</small>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
