<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory | Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f0f2f5; /* Fundo cinza gelo para consistência */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .error-card {
            background-color: #ffffff;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card error-card p-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size: 5rem;"></i>
                </div>

                <h2 class="fw-bold text-dark mb-2" th:text="${errorTitle != null ? errorTitle : 'Oops! Something went wrong'}">
                    Error Detected
                </h2>

                <p class="text-secondary lead mb-4" th:text="${errorMessage}">
                    The requested operation could not be completed.
                </p>

                <div class="mb-4">
                    <span class="badge rounded-pill bg-light text-secondary border px-3 py-2">
                        Status Code:
                        <strong th:text="${status != null ? status : (response != null ? response.status : '500')}">500</strong>
                    </span>
                </div>

                <hr class="my-4 opacity-25">

                <div>
                    <a th:href="@{/products}" class="btn btn-dark btn-lg px-5 rounded-pill shadow-sm fw-bold">
                        <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>
            <p class="mt-4 text-muted small">Inventory System &copy; 2026</p>
        </div>
    </div>
</div>
</body>
</html>
